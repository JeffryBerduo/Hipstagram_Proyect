services:

  sonarqube:
    image: sonarqube:community
    container_name: SonarQube
    restart: always
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://database:5432/BD_Hipstagram
      SONAR_JDBC_USERNAME: postgres
      SONAR_JDBC_PASSWORD: 4659
    depends_on:
      - database
    networks:
      - hipstagram-net
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs

  jenkins:
    build: ./Jenkins
    container_name: Contenedor_Jenkins
    user: root
    ports:
      - "8080:8080"
    volumes:
      - ./jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - hipstagram-net
    depends_on:
      - database
    restart: always

  database:
    image: postgres:16
    container_name: Contenedor_Database
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 4659
      POSTGRES_DB: BD_Hipstagram
    ports:
      - "3000:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hipstagram-net

  auth-service:
    build: ./backend/auth-service
    container_name: contenedor_auth-service
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - ./backend/auth-service/.env
    depends_on:
      - database
    networks:
      - hipstagram-net

  post-service:
    build: ./backend/post-service
    container_name: contenedor_post-service
    restart: always
    ports:
      - "3002:3002"
    env_file:
      - ./backend/post-service/.env
    depends_on:
      - database
    networks:
      - hipstagram-net

  vote-service:
    build: ./backend/vote-service
    container_name: contenedor_vote-service
    restart: always
    ports:
      - "3003:3003"
    env_file:
      - ./backend/vote-service/.env
    depends_on:
      - database
    networks:
      - hipstagram-net

  comment-service:
    build: ./backend/comment-service
    container_name: contenedor_comment-service
    restart: always
    ports:
      - "3004:3004"
    env_file:
      - ./backend/comment-service/.env
    depends_on:
      - database
    networks:
      - hipstagram-net

  search-service:
    build: ./backend/search-service
    container_name: contenedor_search-service
    restart: always
    ports:
      - "3005:3005"
    env_file:
      - ./backend/search-service/.env
    depends_on:
      - database
    networks:
      - hipstagram-net

networks:
  hipstagram-net:
    driver: bridge

volumes:
  postgres_data:
  sonarqube_data:
  sonarqube_logs: