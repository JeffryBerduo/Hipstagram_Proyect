services:
  database:
    image: postgres:16
    container_name: Contenedor_Database
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 4659
      POSTGRES_DB: BD_Hipstagram
    ports:
      - "3000:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  auth-service:
    build: ./backend/auth-service
    container_name: contenedor_auth-service
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - ./backend/auth-service/.env
    depends_on:
      - database

  post-service:
    build: ./backend/post-service
    container_name: contenedor_post-service
    restart: always
    ports:
      - "3002:3002"
    env_file:
      - ./backend/post-service/.env
    depends_on:
      - database


  vote-service:
    build: ./backend/vote-service
    container_name: contenedor_vote-service
    restart: always
    ports:
      - "3003:3003"
    env_file:
      - ./backend/vote-service/.env
    depends_on:
      - database
    

volumes:
  postgres_data:  