services:

  jenkins:
    build: ./Jenkins
    container_name: Contenedor_Jenkins
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - ./jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock  # acceso al Docker del host
    networks:
      - ci-net
    restart: always

  sonarqube:
    image: sonarqube:community
    container_name: SonarQube
    restart: always
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar123
    depends_on:
      - sonar-db
    networks:
      - ci-net
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs

  # Base de datos EXCLUSIVA para SonarQube
  sonar-db:
    image: postgres:16
    container_name: Contenedor_SonarDB
    restart: always
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar123
      POSTGRES_DB: sonarqube
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    networks:
      - ci-net

networks:
  ci-net:
    driver: bridge

volumes:
  sonarqube_data:
  sonarqube_logs:
  sonar_db_data: