<div class="container">
  <div class="register-box">
    <h1>Hipstagram</h1>
    <p>Registrate para ver fotos de tus amigos.</p>

    <div class="input-group">
      <input type="text"     placeholder="Username"   [(ngModel)]="username" />
    </div>

    <div class="input-group">
      <input type="email"    placeholder="Email"      [(ngModel)]="email" />
    </div>

    <div class="input-group">
      <input type="password" placeholder="Contraseña" [(ngModel)]="contrasena" />
    </div>

    <p class="error" *ngIf="error">{{ error }}</p>

    <button class="btn" (click)="registrarse()" [disabled]="cargando">
      {{ cargando ? 'Registrando...' : 'Registrarse' }}
    </button>
  </div>

  <div class="login-box">
    <p>¿Ya tenés cuenta? <a routerLink="/login">Iniciá sesión</a></p>
  </div>
</div>
