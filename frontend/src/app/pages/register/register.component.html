<div class="container">
  <div class="card">

    <div class="encabezado">
      <div class="titulo">Crea tu cuenta</div>
      <svg class="icono-lapiz" viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 20h9"/>
        <path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
    </div>

    <div class="input-group">
      <label>Nombre</label>
      <div class="input-con-icono">
        <input type="text" [(ngModel)]="username" />
      </div>
    </div>

    <div class="input-group">
      <label>Email</label>
      <div class="input-con-icono">
        <input type="email" [(ngModel)]="email" />
      </div>
    </div>

    <div class="input-group">
      <label>Password</label>
      <div class="input-con-icono">
        <input [type]="mostrarContrasena ? 'text' : 'password'" [(ngModel)]="contrasena" />
      </div>
    </div>

    <p class="error" *ngIf="error">{{ error }}</p>

    <div class="slogan">Captura tus mejores momentos</div>

    <button class="btn" (click)="registrarse()" [disabled]="cargando">
      {{ cargando ? 'Registrando...' : 'Registrarme' }}
    </button>

  </div>

  <div class="login-box">
    <p>¿Ya tienes cuenta? <a routerLink="/login">Iniciá sesión</a></p>
  </div>
</div>
