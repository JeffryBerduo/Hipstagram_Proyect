<div class="pagina-busqueda">

  <!-- HEADER -->
  <header class="header">
    <button class="btn-volver" (click)="volverAlFeed()" title="Volver al feed">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12" />
        <polyline points="12 19 5 12 12 5" />
      </svg>
    </button>

    <h1 class="titulo-busqueda">Resultados de búsqueda</h1>
  </header>

  <!-- BARRA DE BÚSQUEDA Y FILTROS -->
  <div class="buscador-seccion">
    <div class="buscador-contenedor">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8" />
        <path d="M21 21l-4.35-4.35" />
      </svg>
      <input type="text" [(ngModel)]="termino" placeholder="Busca publicaciones, hashtags o usuarios..."
        (keyup.enter)="realizarBusqueda()" class="input-busqueda" />
      <button (click)="realizarBusqueda()" class="btn-buscar">Buscar</button>
    </div>

    <div class="filtros">
      <button [class.activo]="tipo === 'texto'" (click)="tipo = 'texto'; realizarBusqueda()" class="filtro-btn">
        Texto
      </button>
      <button [class.activo]="tipo === 'hashtag'" (click)="tipo = 'hashtag'; realizarBusqueda()" class="filtro-btn">
        Hashtag
      </button>
      <button [class.activo]="tipo === 'usuario'" (click)="tipo = 'usuario'; realizarBusqueda()" class="filtro-btn">
        Usuario
      </button>
    </div>
  </div>

  <!-- CONTENIDO -->
  <div class="contenido-busqueda">
    <!-- RESULTADOS -->
    <div *ngIf="!cargando && resultados.length > 0" class="resultados">
      <p class="info-resultados">Se encontraron {{ resultados.length }} resultado(s)</p>

      <div class="post-card" *ngFor="let post of resultados">

        <!-- Post Header -->
        <div class="post-header">
          <div class="avatar-ring">
            <div class="post-avatar">{{ post.username?.charAt(0)?.toUpperCase() }}</div>
          </div>
          <div class="post-info">
            <div class="post-username">{{ post.username }}</div>
            <div class="post-fecha">{{ post.created_at | date:'d MMM yyyy' }}</div>
          </div>
        </div>

        <!-- Imagen o texto -->
        <img *ngIf="post.image_url" [src]="post.image_url" class="post-imagen" [alt]="post.description" />
        <div class="post-texto-card" *ngIf="!post.image_url">
          <p>{{ post.description }}</p>
        </div>

        <!-- Tags -->
        <div class="post-tags" *ngIf="post.hashtags">
          <span *ngFor="let tag of post.hashtags.split(',')" class="tag">
            #{{ tag.trim() }}
          </span>
        </div>

        <!-- Acciones -->
        <div class="post-acciones">
          <div class="acciones-grupo">
            <button class="btn-icono" [class.liked]="postLiked[post.id]" (click)="toggleLike(post.id)" title="Me gusta">
              <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path
                  d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 000-7.78z" />
              </svg>
              <span *ngIf="votos[post.id]?.likes">{{ votos[post.id]?.likes }}</span>
            </button>
            <button class="btn-icono dislike-btn" [class.disliked]="postDisliked[post.id]"
              (click)="toggleDislike(post.id)" title="No me gusta">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10 15v4a3 3 0 003  3l4-9V2H5.72a2 2 0 00-2 1.7l-1.38 9a2 2 0 002 2.3H10z" />
              </svg>
              <span *ngIf="votos[post.id]?.dislikes">{{ votos[post.id]?.dislikes }}</span>
            </button>
          </div>
        </div>

      </div>

    </div>
  </div>

</div>
